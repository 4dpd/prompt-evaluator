<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>프롬프트 평가 도우미</title>
</head>
<body>
  <h1>Firebase 연결 테스트</h1>
  <p id="status">연결 중...</p>

  <script type="module">
    import { initializeApp } from
      "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD76mjvVWadZwYmIlllUr37hXrib8JuHmk",
  authDomain: "prompt-evaluator-xxxxx.firebaseapp.com",
  projectId: "prompt-evaluator-xxxxx",
  storageBucket: "prompt-evaluator-xxxxx.appspot.com",
  messagingSenderId: "123456789",
  appId: "1:123456789:web:abcdef"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    await setDoc(doc(db, "test", "hello"), { msg: "연결 성공!" });
    document.getElementById("status").textContent = "Firebase 연결 성공!";
  </script>
</body>
</html>
