<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>프롬프트 평가 도우미</title>

<body>
  <h1>Firebase 연결 테스트</h1>
  <p id="status">연결 중...</p>

  <script type="module">
    import { initializeApp } from
      "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCX_blcSTiQTGcj4bn-NC-OArXGJDD07yU",
  authDomain: "prompt-evaluator-f3544.firebaseapp.com",
  projectId: "prompt-evaluator-f3544",
  storageBucket: "prompt-evaluator-f3544.firebasestorage.app",
  messagingSenderId: "370613778053",
  appId: "1:370613778053:web:67103f3885f8fe02eb9bec"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    await setDoc(doc(db, "test", "hello"), { msg: "연결 성공!" });
    document.getElementById("status").textContent = "Firebase 연결 성공!";
  </script>
</body>
</html>
